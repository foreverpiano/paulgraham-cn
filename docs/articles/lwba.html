<script>
document.addEventListener('DOMContentLoaded', function(){
  var KEY = 'pg_read';
  var read;
  try { read = JSON.parse(localStorage.getItem(KEY) || '{}'); if (typeof read !== 'object' || Array.isArray(read)) read = {}; } catch(e) { read = {}; }

  var slug = location.pathname.match(/articles\/([^\/]+)\.html/);
  if (slug) { read[slug[1]] = Date.now(); try { localStorage.setItem(KEY, JSON.stringify(read)); } catch(e) {} }

  var items = document.querySelectorAll('.article-list a');
  var total = 0, done = 0;
  items.forEach(function(a){
    var href = a.getAttribute('href') || '';
    var m = href.match(/articles\/([^\/]+)\.html/);
    if (!m) return;
    total++;
    if (read[m[1]]) {
      a.style.opacity = '0.5';
      a.insertAdjacentHTML('afterbegin', '<span style="color:#2d5a7b;margin-right:6px">✓</span>');
      done++;
    }
  });
  var h = document.querySelector('.nav-section h2');
  if (total > 0 && h) h.textContent += ' · 已读 ' + done + '/' + total;
});
</script>
